<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤿 Dive Log — 見れた魚を追加</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32.png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dive Log">
  <meta name="theme-color" content="#03111f">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>
  <header class="app-header">
    <a href="./index.html" class="logo">🤿 Dive Log</a>
  </header>

  <main class="container">
    <div class="card">
      <h2 class="card-title">🐠 見れた魚を後から追加</h2>
      <p class="card-sub">ダイブを選んで魚を検索・追加してください</p>

      <div id="alert-area"></div>

      <div class="form">
        <div class="field">
          <label for="dive-select">ダイブを選択</label>
          <select id="dive-select">
            <option value="">— 読み込み中... —</option>
          </select>
        </div>

        <div class="field">
          <label>追加する魚</label>
          <div class="fish-widget">
            <div class="fish-chips" id="fish-chips"></div>
            <input type="text" id="fish-input" placeholder="魚名を入力して検索..."
                   autocomplete="off" autocorrect="off" spellcheck="false">
            <div class="fish-dropdown" id="fish-dropdown" hidden></div>
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-full" id="btn-save">追加する</button>
      </div>
    </div>

    <div class="card" style="margin-top:8px;">
      <a href="./index.html" class="btn btn-secondary btn-full">🏠 記録メニューへ</a>
    </div>
  </main>

  <script type="module">
    import { requireAuth } from "../js/supabaseClient.js";
    import { listRecentDives, searchFish, addFish, appendFishToDive, searchFishMaster, addFishFromMaster } from "../js/api.js";
    import { esc, showAlert } from "../js/ui.js";

    const user = await requireAuth();

    const select = document.getElementById("dive-select");
    const dives  = await listRecentDives();
    select.innerHTML = '<option value="">— ダイブを選んでください —</option>';
    dives.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.dataset.date = d.date;
      const fishCount = d.dive_fish?.length ?? 0;
      opt.textContent = `${d.date} ${d.location} #${d.dive_number ?? "?"}${d.point ? " " + d.point : ""}`
        + (fishCount ? ` 🐠×${fishCount}` : "");
      select.appendChild(opt);
    });

    // ── 魚チップ（登録済み選択 + 新規はその場で登録）─────
    const chosen = new Map();   // fishId -> name
    const masterChosen = new Map();  // masterId -> name
    let   tempCounter = 0;
    const pending = new Map();  // 'new_N' -> name

    function renderChips() {
      const c = document.getElementById("fish-chips");
      c.innerHTML = "";
      chosen.forEach((name, id)       => c.appendChild(makeChip(name, id, "db")));
      masterChosen.forEach((name, id) => c.appendChild(makeChip(name, id, "master")));
      pending.forEach((name, id)      => c.appendChild(makeChip(name, id, "pending")));
    }
    function makeChip(name, id, kind) {
      const chip = document.createElement("span");
      chip.className = `fish-chip${kind === "pending" ? " fish-chip-new" : ""}`;
      const mark = kind === "pending" ? "🆕 " : kind === "master" ? "📖 " : "";
      chip.innerHTML = `${mark}${esc(name)} <button type="button">×</button>`;
      chip.querySelector("button").addEventListener("click", () => {
        ({ db: chosen, master: masterChosen, pending })[kind].delete(id);
        renderChips();
      });
      return chip;
    }

    const input    = document.getElementById("fish-input");
    const dropdown = document.getElementById("fish-dropdown");
    let   timer;

    input.addEventListener("input", () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (!q) { dropdown.hidden = true; return; }
      timer = setTimeout(() => fetchFish(q), 250);
    });
    input.addEventListener("keydown", e => { if (e.key === "Escape") dropdown.hidden = true; });
    document.addEventListener("click", e => {
      if (!e.target.closest(".fish-widget")) dropdown.hidden = true;
    });

    async function fetchFish(q) {
      let mine = [], masters = [];
      try {
        [mine, masters] = await Promise.all([searchFish(q), searchFishMaster(q)]);
      } catch { /* 新規のみ表示 */ }
      const mineNames = new Set(mine.map(f => f.name));
      masters = masters.filter(m => !mineNames.has(m.name));

      dropdown.innerHTML = "";
      mine.forEach(f => {
        const item = document.createElement("div");
        item.className   = "dropdown-item";
        item.textContent = f.name;
        item.onclick = () => {
          if (!chosen.has(f.id)) { chosen.set(f.id, f.name); renderChips(); }
          input.value = "";
          dropdown.hidden = true;
        };
        dropdown.appendChild(item);
      });
      masters.forEach(m => {
        const item = document.createElement("div");
        item.className = "dropdown-item";
        item.innerHTML = `📖 ${esc(m.name)} <span style="font-size:.75rem;color:var(--sub)">図鑑から${m.family ? " · " + esc(m.family) : ""}</span>`;
        item.onclick = () => {
          masterChosen.set(m.id, m.name);
          renderChips();
          input.value = "";
          dropdown.hidden = true;
        };
        dropdown.appendChild(item);
      });
      const addItem = document.createElement("div");
      addItem.className   = "dropdown-item dropdown-add";
      addItem.textContent = `「${q}」を新しく追加（図鑑にない魚）`;
      addItem.onclick = () => {
        pending.set(`new_${tempCounter++}`, q);
        renderChips();
        input.value = "";
        dropdown.hidden = true;
      };
      dropdown.appendChild(addItem);
      dropdown.hidden = false;
    }

    // ── 保存 ──────────────────────────────────────────
    document.getElementById("btn-save").addEventListener("click", async () => {
      const diveId = select.value;
      const btn    = document.getElementById("btn-save");

      if (!diveId) { showAlert("ダイブを選択してください", "error"); return; }
      if (!chosen.size && !masterChosen.size && !pending.size) { showAlert("魚を1種以上選んでください", "error"); return; }

      btn.disabled = true;
      btn.textContent = "⏳ 保存中...";
      try {
        const diveDate = select.options[select.selectedIndex].dataset.date;
        // マスター図鑑から選んだ魚 → 個人図鑑にコピー作成
        for (const [masterId, name] of masterChosen) {
          try {
            const id = await addFishFromMaster(user.id, masterId, diveDate);
            chosen.set(id, name);
          } catch {
            const hit = (await searchFish(name)).find(f => f.name === name);
            if (hit) chosen.set(hit.id, name);
          }
          masterChosen.delete(masterId);
        }
        // 未登録の魚は図鑑に登録してIDを得る
        for (const [key, name] of pending) {
          const id = await addFish(user.id, { name, category: "魚類", first_seen: diveDate });
          chosen.set(id, name);
          pending.delete(key);
        }
        await appendFishToDive(user.id, diveId, [...chosen.keys()]);

        showAlert(`✅ ${chosen.size}種を追加しました！`, "success");
        const opt = select.options[select.selectedIndex];
        const m   = opt.textContent.match(/🐠×(\d+)/);
        const cur = m ? parseInt(m[1], 10) : 0;
        opt.textContent = opt.textContent.replace(/\s*🐠×\d+/, "") + ` 🐠×${cur + chosen.size}`;
        chosen.clear();
        renderChips();
      } catch (e) {
        showAlert("エラー: " + e.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "追加する";
      }
    });
  </script>
</body>
</html>
