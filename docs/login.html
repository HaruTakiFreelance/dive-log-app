<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Dive Log</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dive Log">
  <meta name="theme-color" content="#03111f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #03111f 0%, #051828 45%, #071e32 100%);
      min-height: 100vh;
      font-family: 'Playfair Display', Georgia, serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #f4ecdc;
      border-radius: 3px;
      box-shadow: 0 12px 48px rgba(0,0,0,.5);
      padding: 44px 36px;
      width: 100%; max-width: 400px;
      text-align: center;
    }
    .stamp {
      display: inline-block;
      font-family: 'Special Elite', monospace;
      font-size: .68rem; letter-spacing: .24em;
      color: #8b3a1e; border: 2px solid #8b3a1e;
      padding: 5px 14px; border-radius: 2px;
      margin-bottom: 18px; text-transform: uppercase;
    }
    h1 {
      font-family: 'Special Elite', monospace;
      font-size: 2.2rem; color: #2a2418; margin-bottom: 6px;
    }
    .sub { font-style: italic; color: #7a705c; font-size: .9rem; margin-bottom: 28px; }
    .field { text-align: left; margin-bottom: 16px; }
    .field label {
      display: block;
      font-family: 'Special Elite', monospace;
      font-size: .7rem; letter-spacing: .12em;
      color: #7a705c; margin-bottom: 5px; text-transform: uppercase;
    }
    input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #d4c8ae; border-radius: 3px;
      background: #fbf6ea; font-size: 1rem; font-family: inherit;
      color: #2a2418;
    }
    input:focus { outline: none; border-color: #8b6f3e; }
    button {
      width: 100%; padding: 13px;
      margin-top: 8px;
      background: #1a3a50; color: #e8dfc8;
      border: none; border-radius: 3px;
      font-family: 'Special Elite', monospace;
      font-size: .95rem; letter-spacing: .14em;
      cursor: pointer; text-transform: uppercase;
    }
    button:hover { background: #234b66; }
    button:disabled { opacity: .6; cursor: default; }
    .error {
      background: #fdf0ee; color: #a33b25;
      border: 1px solid #e5b8ac; border-radius: 3px;
      padding: 10px 12px; font-size: .85rem; margin-bottom: 14px;
      text-align: left;
    }
    .note { margin-top: 22px; font-size: .78rem; color: #a3987f; font-style: italic; }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 4px;
      color: #a3987f; font-size: .75rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #d4c8ae;
    }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fbf6ea; color: #2a2418;
      border: 1.5px solid #d4c8ae;
      text-transform: none;
      font-family: inherit; font-size: .92rem; letter-spacing: 0;
    }
    .google-btn:hover { background: #f2ead6; }
    .google-error {
      margin-top: 8px; font-size: .78rem; color: #a33b25; text-align: left;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="stamp">Personal Dive Log Book</div>
    <h1>Dive Log</h1>
    <p class="sub">ログインして自分のログブックを開く</p>

    <div id="error" class="error" hidden></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="btn">Log In</button>
    </form>

    <div class="or-divider"><span>または</span></div>

    <button type="button" id="btn-google" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <p class="google-error" id="google-error" hidden></p>

    <p class="note">はじめての方は「Googleでログイン」を押すだけで<br>そのままアカウントが作成されます。</p>
  </div>

  <script type="module">
    import { supabase } from "./js/supabaseClient.js";

    // ログイン済みならホームへ
    const { data: { session } } = await supabase.auth.getSession();
    const next = new URLSearchParams(location.search).get("next");
    if (session) location.href = next || "./index.html";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const errBox = document.getElementById("error");
      btn.disabled = true; btn.textContent = "…";
      errBox.hidden = true;

      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      });

      if (error) {
        errBox.textContent = "ログインできませんでした: " + (
          error.message === "Invalid login credentials"
            ? "メールアドレスまたはパスワードが違います"
            : error.message
        );
        errBox.hidden = false;
        btn.disabled = false; btn.textContent = "Log In";
        return;
      }
      location.href = next || "./index.html";
    });

    // Googleログイン（Supabase側でGoogleプロバイダを有効化している場合のみ機能）
    document.getElementById("btn-google").addEventListener("click", async () => {
      const errBox = document.getElementById("google-error");
      errBox.hidden = true;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: new URL("./index.html", location.href).href },
      });
      if (error) {
        errBox.textContent = error.message.includes("not enabled")
          ? "Googleログインは現在準備中です。メールアドレスでログインしてください。"
          : "Googleログインに失敗しました: " + error.message;
        errBox.hidden = false;
      }
    });
  </script>
</body>
</html>
