<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Dive Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #03111f 0%, #051828 45%, #071e32 100%);
      min-height: 100vh;
      font-family: 'Playfair Display', Georgia, serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #f4ecdc;
      border-radius: 3px;
      box-shadow: 0 12px 48px rgba(0,0,0,.5);
      padding: 44px 36px;
      width: 100%; max-width: 400px;
      text-align: center;
    }
    .stamp {
      display: inline-block;
      font-family: 'Special Elite', monospace;
      font-size: .68rem; letter-spacing: .24em;
      color: #8b3a1e; border: 2px solid #8b3a1e;
      padding: 5px 14px; border-radius: 2px;
      margin-bottom: 18px; text-transform: uppercase;
    }
    h1 {
      font-family: 'Special Elite', monospace;
      font-size: 2.2rem; color: #2a2418; margin-bottom: 6px;
    }
    .sub { font-style: italic; color: #7a705c; font-size: .9rem; margin-bottom: 28px; }
    .field { text-align: left; margin-bottom: 16px; }
    .field label {
      display: block;
      font-family: 'Special Elite', monospace;
      font-size: .7rem; letter-spacing: .12em;
      color: #7a705c; margin-bottom: 5px; text-transform: uppercase;
    }
    input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #d4c8ae; border-radius: 3px;
      background: #fbf6ea; font-size: 1rem; font-family: inherit;
      color: #2a2418;
    }
    input:focus { outline: none; border-color: #8b6f3e; }
    button {
      width: 100%; padding: 13px;
      margin-top: 8px;
      background: #1a3a50; color: #e8dfc8;
      border: none; border-radius: 3px;
      font-family: 'Special Elite', monospace;
      font-size: .95rem; letter-spacing: .14em;
      cursor: pointer; text-transform: uppercase;
    }
    button:hover { background: #234b66; }
    button:disabled { opacity: .6; cursor: default; }
    .error {
      background: #fdf0ee; color: #a33b25;
      border: 1px solid #e5b8ac; border-radius: 3px;
      padding: 10px 12px; font-size: .85rem; margin-bottom: 14px;
      text-align: left;
    }
    .note { margin-top: 22px; font-size: .78rem; color: #a3987f; font-style: italic; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="stamp">Personal Dive Log Book</div>
    <h1>Dive Log</h1>
    <p class="sub">ログインして自分のログブックを開く</p>

    <div id="error" class="error" hidden></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="btn">Log In</button>
    </form>

    <p class="note">アカウントは管理者からの招待制です。<br>招待メールが届いていない場合は管理者に連絡してください。</p>
  </div>

  <script type="module">
    import { supabase } from "./js/supabaseClient.js";

    // ログイン済みならホームへ
    const { data: { session } } = await supabase.auth.getSession();
    const next = new URLSearchParams(location.search).get("next");
    if (session) location.href = next || "./index.html";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const errBox = document.getElementById("error");
      btn.disabled = true; btn.textContent = "…";
      errBox.hidden = true;

      const { error } = await supabase.auth.signInWithPassword({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      });

      if (error) {
        errBox.textContent = "ログインできませんでした: " + (
          error.message === "Invalid login credentials"
            ? "メールアドレスまたはパスワードが違います"
            : error.message
        );
        errBox.hidden = false;
        btn.disabled = false; btn.textContent = "Log In";
        return;
      }
      location.href = next || "./index.html";
    });
  </script>
</body>
</html>
